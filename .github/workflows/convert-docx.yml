name: Convert DOCX to Markdown

on:
  workflow_dispatch:
    inputs:
      docx_url:
        description: "Temporary URL to the uploaded .docx file"
        required: true
        type: string
      docx_name:
        description: "Original .docx file name"
        required: true
        type: string

permissions:
  contents: read

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Download DOCX
        shell: bash
        env:
          DOCX_URL: ${{ inputs.docx_url }}
          DOCX_NAME: ${{ inputs.docx_name }}
        run: |
          set -euo pipefail
          mkdir -p input
          curl -L "$DOCX_URL" -o "input/$DOCX_NAME"

      - name: Convert DOCX
        shell: bash
        env:
          DOCX_NAME: ${{ inputs.docx_name }}
        run: |
          set -euo pipefail
          base="$(basename "$DOCX_NAME" .docx)"
          outdir="output/$base"
          mkdir -p "$outdir"
          # Use enhanced pandoc options to preserve layout, tables, and formatting
          pandoc -t gfm \
            --extract-media "$outdir/images" \
            --from docx \
            --wrap=preserve \
            --preserve-tabs \
            --tab-stop=4 \
            --columns=100 \
            "input/$DOCX_NAME" \
            -o "$outdir/$base.md"

      - name: Rename images to DDMMYY format
        shell: bash
        env:
          DOCX_NAME: ${{ inputs.docx_name }}
        run: |
          set -euo pipefail
          base="$(basename "$DOCX_NAME" .docx)"
          outdir="output/$base"
          imgdir="$outdir/images"
          
          # Get today's date in DDMMYY format
          datestr=$(date +%d%m%y)
          counter=0
          
          # Rename all images in images folder to imageDDMMYYNNN format
          if [ -d "$imgdir" ]; then
            for file in "$imgdir"/*; do
              if [ -f "$file" ]; then
                ext="${file##*.}"
                newname="image${datestr}$(printf %03d $counter).$ext"
                mv "$file" "$imgdir/$newname"
                
                # Update markdown to reference new image name
                oldname=$(basename "$file")
                sed -i "s|$oldname|$newname|g" "$outdir/$base.md"
                
                counter=$((counter + 1))
              fi
            done
          fi
          
          # Ensure all image references use images/ folder
          sed -i 's|media/|images/|g' "$outdir/$base.md" || true

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-and-media
          path: output
