name: Convert DOCX to Markdown

on:
  workflow_dispatch:
    inputs:
      docx_url:
        description: "Temporary URL to the uploaded .docx file"
        required: true
        type: string
      docx_name:
        description: "Original .docx file name"
        required: true
        type: string

permissions:
  contents: read

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Download DOCX
        shell: bash
        env:
          DOCX_URL: ${{ inputs.docx_url }}
          DOCX_NAME: ${{ inputs.docx_name }}
        run: |
          set -euo pipefail
          mkdir -p input
          curl -L "$DOCX_URL" -o "input/$DOCX_NAME"

      - name: Convert DOCX
        shell: bash
        env:
          DOCX_NAME: ${{ inputs.docx_name }}
        run: |
          set -euo pipefail
          base="$(basename "$DOCX_NAME" .docx)"
          outdir="output/$base"
          tmpdir="$outdir/tmp_media"
          mkdir -p "$outdir"
          
          # Extract to temp folder (pandoc creates media/ subfolder automatically)
          pandoc -f docx -t gfm \
            --extract-media="$tmpdir" \
            "input/$DOCX_NAME" \
            -o "$outdir/$base.md"
          
          # Move all images from tmp_media/media/ to images/
          mkdir -p "$outdir/images"
          if [ -d "$tmpdir/media" ]; then
            mv "$tmpdir/media"/* "$outdir/images/" 2>/dev/null || true
            rm -rf "$tmpdir"
          fi
          
          # Verify images were extracted
          if [ -z "$(ls -A $outdir/images 2>/dev/null)" ]; then
            echo "Warning: No images were extracted from the DOCX file"
          else
            echo "Images extracted successfully to images/ folder"
          fi

      - name: Rename images to DDMMYY format
        shell: bash
        env:
          DOCX_NAME: ${{ inputs.docx_name }}
        run: |
          set -euo pipefail
          base="$(basename "$DOCX_NAME" .docx)"
          outdir="output/$base"
          imgdir="$outdir/images"
          mdfile="$outdir/$base.md"
          
          # Get today's date in DDMMYY format
          datestr=$(date +%d%m%y)
          counter=0
          
          # First, fix all markdown image references to use images/ folder only
          sed -i 's|!\[\([^]]*\)\]([^)]*media/\([^)]*\))|\![\1](images/\2)|g' "$mdfile" || true
          sed -i 's|!\[\([^]]*\)\]([^)]*images/images/\([^)]*\))|\![\1](images/\2)|g' "$mdfile" || true
          sed -i 's|<img src="[^"]*media/\([^"]*\)"|<img src="images/\1"|g' "$mdfile" || true
          sed -i 's|<img src="[^"]*images/images/\([^"]*\)"|<img src="images/\1"|g' "$mdfile" || true
          
          # Now rename images and update references
          if [ -d "$imgdir" ]; then
            # Create a temporary mapping file
            for file in "$imgdir"/*; do
              if [ -f "$file" ]; then
                oldname=$(basename "$file")
                ext="${file##*.}"
                newname="image${datestr}$(printf %03d $counter).$ext"
                
                # Only rename if not already in correct format
                if [[ ! "$oldname" =~ ^image[0-9]{6}[0-9]{3}\. ]]; then
                  # Rename file
                  mv "$file" "$imgdir/$newname"
                  
                  # Update markdown references with old filename to new filename
                  sed -i "s|$oldname|$newname|g" "$mdfile" || true
                fi
                
                counter=$((counter + 1))
              fi
            done
          fi

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-and-media
          path: output
