name: Convert DOCX to Markdown

on:
  workflow_dispatch:
    inputs:
      docx_url:
        description: "Temporary URL to the uploaded .docx file"
        required: true
        type: string
      docx_name:
        description: "Original .docx file name"
        required: true
        type: string

permissions:
  contents: read

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Download DOCX
        shell: bash
        env:
          DOCX_URL: ${{ inputs.docx_url }}
          DOCX_NAME: ${{ inputs.docx_name }}
        run: |
          set -euo pipefail
          mkdir -p input
          curl -L "$DOCX_URL" -o "input/$DOCX_NAME"

      - name: Convert DOCX
        shell: bash
        env:
          DOCX_NAME: ${{ inputs.docx_name }}
        run: |
          set -euo pipefail
          base="$(basename "$DOCX_NAME" .docx)"
          outdir="output/$base"
          tmpdir="$outdir/tmp_media"
          mkdir -p "$outdir"
          
          # Extract to temp folder (pandoc creates media/ subfolder automatically)
          pandoc -f docx -t gfm \
            --extract-media="$tmpdir" \
            "input/$DOCX_NAME" \
            -o "$outdir/$base.md"
          
          # Move all images from tmp_media/media/ to images/
          mkdir -p "$outdir/images"
          if [ -d "$tmpdir/media" ]; then
            mv "$tmpdir/media"/* "$outdir/images/" 2>/dev/null || true
            rm -rf "$tmpdir"
          fi
          
          # Verify images were extracted
          if [ -z "$(ls -A $outdir/images 2>/dev/null)" ]; then
            echo "Warning: No images were extracted from the DOCX file"
          else
            echo "Images extracted successfully to images/ folder"
          fi

      - name: Rename images to DDMMYY format
        shell: bash
        env:
          DOCX_NAME: ${{ inputs.docx_name }}
        run: |
          set -euo pipefail
          base="$(basename "$DOCX_NAME" .docx)"
          outdir="output/$base"
          imgdir="$outdir/images"
          mdfile="$outdir/$base.md"
          
          # Get today's date in DDMMYY format
          datestr=$(date +%d%m%y)
          counter=0
          
          echo "Processing images in: $imgdir"
          echo "Markdown file: $mdfile"
          
          # List current images
          if [ -d "$imgdir" ]; then
            echo "Current images:"
            ls -la "$imgdir" || echo "Error listing images"
          else
            echo "Images directory does not exist!"
          fi
          
          # Process all images - rename and update markdown
          if [ -d "$imgdir" ]; then
            # Use find to handle all files safely
            find "$imgdir" -maxdepth 1 -type f | sort | while read -r file; do
              oldname=$(basename "$file")
              ext="${file##*.}"
              newname="image${datestr}$(printf %03d $counter).$ext"
              
              echo "Processing: $oldname -> $newname"
              
              # Rename the file
              mv "$file" "$imgdir/$newname"
              
              # Update markdown - handle various formats
              if [ -f "$mdfile" ]; then
                sed -i "s|$oldname|$newname|g" "$mdfile"
                sed -i "s|media/$oldname|$newname|g" "$mdfile"
                sed -i "s|images/images/$oldname|$newname|g" "$mdfile"
              fi
              
              counter=$((counter + 1))
            done
          fi
          
          # Final cleanup of markdown references
          if [ -f "$mdfile" ]; then
            sed -i 's|media/|images/|g' "$mdfile"
            sed -i 's|images/images/|images/|g' "$mdfile"
          fi
          
          echo "Image processing complete"
          echo "Final images:"
          ls -la "$imgdir" 2>/dev/null || echo "No images in directory"

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-and-media
          path: output
